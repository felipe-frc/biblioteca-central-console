name: CI

on:
  push:
    branches: [ "master", "main", "develop" ]
  pull_request:
    branches: [ "master", "main", "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore Biblioteca.sln

      - name: Build
        run: dotnet build Biblioteca.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test Biblioteca.sln --no-build --configuration Release